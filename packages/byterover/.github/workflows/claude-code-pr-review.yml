name: Claude Code PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    branches:
      - main
      - 'proj/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "draft: ${{ github.event.pull_request.draft }}"
          echo "author_association: ${{ github.event.pull_request.author_association }}"

  auto-review:
    if: >-
      ${{
        !github.event.pull_request.draft &&
        contains(fromJSON('["COLLABORATOR", "CONTRIBUTOR", "MEMBER"]'), github.event.pull_request.author_association)
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          track_progress: true
          claude_args: >-
            --allowedTools
            "Read,Glob,Grep,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr checks:*),Bash(gh pr comment:*),mcp__github_inline_comment__create_inline_comment"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this PR for correctness, security, and code quality. Use Conventional Comments.

            Always provide inline comments for specific issues.
            Post a general summary comment with an overall score (0-5, where 0 is poor and 5 is excellent).
