name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  orkestrate:
    name: orkestrate typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orkestrate
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run check

  website:
    name: website build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build