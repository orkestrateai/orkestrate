name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            arch: windows-x86_64
          - platform: macos-latest
            target: aarch64-apple-darwin
            arch: darwin-aarch64
          - platform: macos-15
            target: x86_64-apple-darwin
            arch: darwin-x86_64
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust Target
        run: rustup target add ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install Frontend Deps
        working-directory: desktop
        run: bun install

      - name: Build Desktop
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Orkestrate ${{ github.ref_name }}"
          releaseBody: "See the assets to download and install this version."
          releaseDraft: false
          prerelease: false
          projectPath: desktop
          args: --target ${{ matrix.target }}
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          assetNamePattern: "[name]_[version]_[arch]_[bundle][ext]"

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download platform manifests
        uses: actions/download-artifact@v4
        with:
          pattern: updater-json-*
          merge-multiple: false

      - name: Merge latest.json manifests
        run: |
          set -e
          MERGED="latest.json"
          echo '{ "version": "", "notes": "", "pub_date": "", "platforms": {} }' > "$MERGED"

          for dir in updater-json-*; do
            if [ -f "$dir/latest.json" ]; then
              echo "Merging $dir/latest.json"
              python3 - <<PY
import json

with open("$MERGED") as f: merged = json.load(f)
with open("$dir/latest.json") as f: plat = json.load(f)

merged["version"] = plat.get("version", merged["version"])
merged["notes"] = plat.get("notes", merged["notes"])
merged["pub_date"] = plat.get("pub_date", merged["pub_date"])

for key, val in plat.get("platforms", {}).items():
    merged["platforms"][key] = val

with open("$MERGED", "w") as f: json.dump(merged, f, indent=2)
print("Merged platforms:", list(merged["platforms"].keys()))
PY
            fi
          done

          echo "=== Merged manifest ==="
          cat "$MERGED"

      - name: Upload merged latest.json
        run: |
          gh release upload "${{ github.ref_name }}" latest.json --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
